name: Deploy nfinx to ECS Fargate

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, 'Fix destroy') &&
      !contains(github.event.head_commit.message, 'fix: clean') &&
      !contains(github.event.head_commit.message, 'fix: update terraform backend for destroy') &&
      !contains(github.event.head_commit.message, 'docs: update README') &&
      !startsWith(github.event.head_commit.message, 'chore:')
    outputs:
      alb_url: ${{ steps.tf_outputs.outputs.alb_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create S3 state bucket
        run: |
          BUCKET="${{ secrets.TF_STATE_BUCKET }}"
          REGION="${{ secrets.AWS_REGION }}"

          if aws s3api head-bucket --bucket "$BUCKET" --region "$REGION" 2>/dev/null; then
            echo "✅ Bucket already exists: $BUCKET"
            exit 0
          fi

          echo "Creating bucket: $BUCKET in $REGION"
          if [ "$REGION" = "us-east-1" ]; then
            aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
          else
            aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" \
              --create-bucket-configuration LocationConstraint="$REGION"
          fi

          echo "Waiting for bucket to be ready..."
          for i in $(seq 1 12); do
            if aws s3api head-bucket --bucket "$BUCKET" --region "$REGION" 2>/dev/null; then
              echo "✅ Bucket ready: $BUCKET"
              exit 0
            fi
            echo "  attempt $i/12 — waiting 5s..."
            sleep 5
          done

          echo "❌ Bucket not ready after 60s — aborting"
          exit 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}"
        working-directory: terraform

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_tag=latest" \
            -out=tfplan
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: terraform

      - name: Get Terraform outputs
        id: tf_outputs
        run: |
          echo "alb_url=$(terraform output -raw alb_url)" >> $GITHUB_OUTPUT
        working-directory: terraform

  build-and-push:
    runs-on: ubuntu-latest
    needs: terraform
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        id: build
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          REPO="${{ secrets.PROJECT_NAME }}"
          TAG="${{ github.sha }}"
          IMAGE="$REGISTRY/$REPO:$TAG"

          docker build -t "$IMAGE" .
          docker push "$IMAGE"

          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "✅ Pushed image: $IMAGE"

  deploy-ecs:
    runs-on: ubuntu-latest
    needs: [terraform, build-and-push]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update ECS task definition with new image
        env:
          BUILD_IMAGE: ${{ needs.build-and-push.outputs.image }}
        run: |
          PROJECT="${{ secrets.PROJECT_NAME }}"
          IMAGE="$BUILD_IMAGE"

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$PROJECT" \
            --query "taskDefinition" \
            --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | python3 -c "
          import json, sys, os
          td = json.load(sys.stdin)
          image = os.environ['BUILD_IMAGE']
          project = os.environ['PROJECT']
          for c in td['containerDefinitions']:
              if c['name'] == project:
                  c['image'] = image
          for key in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']:
              td.pop(key, None)
          print(json.dumps(td))
          ")

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "✅ Registered new task definition: $NEW_ARN"

          aws ecs update-service \
            --cluster "${PROJECT}-cluster" \
            --service "${PROJECT}-service" \
            --task-definition "$NEW_ARN" \
            --force-new-deployment \
            --query "service.serviceName" \
            --output text

          echo "✅ ECS service update triggered"

      - name: Wait for ECS service to stabilize
        run: |
          PROJECT="${{ secrets.PROJECT_NAME }}"
          echo "Waiting for ECS service to become stable..."
          aws ecs wait services-stable \
            --cluster "${PROJECT}-cluster" \
            --services "${PROJECT}-service"
          echo "✅ ECS service is stable"

  verify:
    runs-on: ubuntu-latest
    needs: [terraform, deploy-ecs]
    steps:
      - name: Health check ALB
        run: |
          ALB_URL="${{ needs.terraform.outputs.alb_url }}"
          echo "Checking $ALB_URL ..."
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 "$ALB_URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ nfinx is responding with HTTP 200"
              exit 0
            fi
            echo "  attempt $i/18 — got $STATUS, waiting 10s..."
            sleep 10
          done
          echo "❌ nfinx did not respond with 200 after 180s"
          exit 1

  notify:
    runs-on: ubuntu-latest
    needs: [terraform, build-and-push, deploy-ecs, verify]
    steps:
      - name: Print live URL
        run: |
          echo "🚀 Deployment complete!"
          echo "🌐 nfinx is live at: ${{ needs.terraform.outputs.alb_url }}"
          echo "📦 Image deployed: ${{ needs.build-and-push.outputs.image }}"