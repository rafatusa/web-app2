name: Deploy nginx to EC2

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  provision:
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, 'Fix destroy') &&
      !contains(github.event.head_commit.message, 'fix: clean') &&
      !contains(github.event.head_commit.message, 'fix: update terraform backend for destroy') &&
      !contains(github.event.head_commit.message, 'docs: update README') &&
      !startsWith(github.event.head_commit.message, 'chore:')
    outputs:
      server_ip: ${{ steps.get_ip.outputs.ip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Check existing AWS resources
        id: check_ec2
        run: |
          PROJECT="${{ secrets.PROJECT_NAME }}"
          EXISTING_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=$PROJECT" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text 2>/dev/null || echo "None")
          KEY_EXISTS=$(aws ec2 describe-key-pairs \
            --filters "Name=key-name,Values=$PROJECT-key" \
            --query "KeyPairs[0].KeyName" --output text 2>/dev/null || echo "None")
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=$PROJECT-sg" \
            --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || echo "None")
          if [ "$EXISTING_IP" != "None" ] && [ "$EXISTING_IP" != "null" ] && [ -n "$EXISTING_IP" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "ip=$EXISTING_IP" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
          echo "key_exists=$KEY_EXISTS" >> $GITHUB_OUTPUT
          echo "sg_id=$SG_ID" >> $GITHUB_OUTPUT

      - name: Create S3 state bucket
        if: steps.check_ec2.outputs.exists != 'true'
        run: |
          BUCKET="${{ secrets.TF_STATE_BUCKET }}"
          REGION="${{ secrets.AWS_REGION }}"

          if aws s3api head-bucket --bucket "$BUCKET" --region "$REGION" 2>/dev/null; then
            echo "✅ Bucket already exists: $BUCKET"
            exit 0
          fi

          echo "Creating bucket: $BUCKET in $REGION"
          if [ "$REGION" = "us-east-1" ]; then
            aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
          else
            aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" \
              --create-bucket-configuration LocationConstraint="$REGION"
          fi

          echo "Waiting for bucket to be ready..."
          for i in $(seq 1 12); do
            if aws s3api head-bucket --bucket "$BUCKET" --region "$REGION" 2>/dev/null; then
              echo "✅ Bucket ready: $BUCKET"
              exit 0
            fi
            echo "  attempt $i/12 — waiting 5s..."
            sleep 5
          done

          echo "❌ Bucket not ready after 60s — aborting"
          exit 1

      - name: Setup Terraform
        if: steps.check_ec2.outputs.exists != 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        if: steps.check_ec2.outputs.exists != 'true'
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}"
        working-directory: terraform

      - name: Import existing resources
        if: steps.check_ec2.outputs.exists != 'true'
        run: |
          KEY="${{ steps.check_ec2.outputs.key_exists }}"
          SG="${{ steps.check_ec2.outputs.sg_id }}"
          [ "$KEY" != "None" ] && terraform import \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            aws_key_pair.deployer "${{ secrets.PROJECT_NAME }}-key" 2>/dev/null || true
          [ "$SG" != "None" ] && terraform import \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            aws_security_group.sg "$SG" 2>/dev/null || true
        working-directory: terraform

      - name: Terraform Plan
        if: steps.check_ec2.outputs.exists != 'true'
        run: |
          terraform plan \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -out=tfplan
        working-directory: terraform

      - name: Terraform Apply
        if: steps.check_ec2.outputs.exists != 'true'
        run: terraform apply -auto-approve tfplan
        working-directory: terraform

      - name: Get IP
        id: get_ip
        run: |
          if [ "${{ steps.check_ec2.outputs.exists }}" == "true" ]; then
            echo "ip=${{ steps.check_ec2.outputs.ip }}" >> $GITHUB_OUTPUT
          else
            echo "ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT
          fi
        working-directory: terraform

  configure:
    runs-on: ubuntu-latest
    needs: provision
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible

      - name: Write SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Wait for SSH
        run: |
          for i in $(seq 1 30); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -i /tmp/deploy_key ${{ secrets.SSH_USER || 'ubuntu' }}@${{ needs.provision.outputs.server_ip }} echo ok \
              && break || sleep 10
          done

      - name: Run Ansible playbook
        run: |
          ansible-playbook \
            -i "${{ needs.provision.outputs.server_ip }}," \
            --private-key /tmp/deploy_key \
            -u ${{ secrets.SSH_USER || 'ubuntu' }} \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
            ansible/playbook.yml

  verify:
    runs-on: ubuntu-latest
    needs: [provision, configure]
    steps:
      - name: Health check
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "Checking http://$SERVER_IP ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 http://$SERVER_IP || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ nginx is responding with HTTP 200"
              exit 0
            fi
            echo "  attempt $i/12 — got $STATUS, waiting 10s..."
            sleep 10
          done
          echo "❌ nginx did not respond with 200 after 120s"
          exit 1

  notify:
    runs-on: ubuntu-latest
    needs: [provision, configure, verify]
    steps:
      - name: Print live URL
        run: |
          echo "🚀 Deployment complete!"
          echo "🌐 nginx is live at: http://${{ needs.provision.outputs.server_ip }}"