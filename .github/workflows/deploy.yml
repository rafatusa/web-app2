name: Deploy web-app2 to ECS Fargate

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    outputs:
      alb_url: ${{ steps.tf_output.outputs.alb_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create S3 state bucket
        run: |
          BUCKET="${{ secrets.TF_STATE_BUCKET }}"
          REGION="${{ secrets.AWS_REGION }}"

          if aws s3api head-bucket --bucket "$BUCKET" --region "$REGION" 2>/dev/null; then
            echo "✅ Bucket already exists: $BUCKET"
            exit 0
          fi

          echo "Creating bucket: $BUCKET in $REGION"
          if [ "$REGION" = "us-east-1" ]; then
            aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
          else
            aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" \
              --create-bucket-configuration LocationConstraint="$REGION"
          fi

          echo "Waiting for bucket to be ready..."
          for i in $(seq 1 12); do
            if aws s3api head-bucket --bucket "$BUCKET" --region "$REGION" 2>/dev/null; then
              echo "✅ Bucket ready: $BUCKET"
              exit 0
            fi
            echo "  attempt $i/12 — waiting 5s..."
            sleep 5
          done

          echo "❌ Bucket not ready after 60s — aborting"
          exit 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=web-app2/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}"
        working-directory: terraform

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="tf_state_bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -out=tfplan
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: terraform

      - name: Get Terraform outputs
        id: tf_output
        run: |
          ALB_URL=$(terraform output -raw alb_url)
          echo "alb_url=$ALB_URL" >> $GITHUB_OUTPUT
          echo "ALB URL: $ALB_URL"
        working-directory: terraform

  build-push:
    runs-on: ubuntu-latest
    needs: terraform
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          REPO="${{ secrets.PROJECT_NAME }}"
          TAG="${{ github.sha }}"
          IMAGE="$REGISTRY/$REPO:$TAG"

          docker build -t "$IMAGE" .
          docker push "$IMAGE"

          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "✅ Pushed image: $IMAGE"

  deploy-ecs:
    runs-on: ubuntu-latest
    needs: [terraform, build-push]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Register new ECS task definition and update service
        run: |
          PROJECT="${{ secrets.PROJECT_NAME }}"
          IMAGE="${{ needs.build-push.outputs.image }}"
          REGION="${{ secrets.AWS_REGION }}"
          CLUSTER="${PROJECT}-cluster"
          SERVICE="${PROJECT}-service"

          echo "Fetching current task definition..."
          TASK_DEF_JSON=$(aws ecs describe-task-definition \
            --task-definition "$PROJECT" \
            --region "$REGION")

          echo "Building new task definition with updated image..."
          NEW_TASK_DEF=$(echo "$TASK_DEF_JSON" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)['taskDefinition']
          # Update container image
          for c in data['containerDefinitions']:
              if c['name'] == '$PROJECT':
                  c['image'] = '$IMAGE'
          # Remove fields that cannot be passed to register-task-definition
          for field in ['taskDefinitionArn','revision','status','requiresAttributes',
                        'compatibilities','registeredAt','registeredBy','deregisteredAt']:
              data.pop(field, None)
          print(json.dumps(data))
          ")

          echo "Registering new task definition..."
          NEW_ARN=$(aws ecs register-task-definition \
            --region "$REGION" \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "New task definition ARN: $NEW_ARN"

          echo "Updating ECS service..."
          aws ecs update-service \
            --region "$REGION" \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$NEW_ARN" \
            --desired-count 1 \
            --force-new-deployment

          echo "✅ ECS service updated with new task definition"

      - name: Wait for ECS service to stabilize
        run: |
          PROJECT="${{ secrets.PROJECT_NAME }}"
          REGION="${{ secrets.AWS_REGION }}"

          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --region "$REGION" \
            --cluster "${PROJECT}-cluster" \
            --services "${PROJECT}-service"

          echo "✅ ECS service is stable"

  verify:
    runs-on: ubuntu-latest
    needs: [terraform, deploy-ecs]
    steps:
      - name: Health check via ALB
        run: |
          ALB_URL="${{ needs.terraform.outputs.alb_url }}"
          echo "Checking $ALB_URL ..."

          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 "$ALB_URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Application is responding with HTTP 200"
              exit 0
            fi
            echo "  attempt $i/24 — got HTTP $STATUS, waiting 10s..."
            sleep 10
          done

          echo "❌ Application did not respond with HTTP 200 after 240s"
          exit 1

  notify:
    runs-on: ubuntu-latest
    needs: [terraform, build-push, deploy-ecs, verify]
    if: always()
    steps:
      - name: Print deployment result
        run: |
          if [ "${{ needs.verify.result }}" = "success" ]; then
            echo "🚀 Deployment complete!"
            echo "🌐 web-app2 is live at: ${{ needs.terraform.outputs.alb_url }}"
            echo "🐳 Image: ${{ needs.build-push.outputs.image }}"
          else
            echo "❌ Deployment failed — check logs above"
            exit 1
          fi