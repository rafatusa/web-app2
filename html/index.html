<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>web-app2</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #111118;
      --bg-card: #16161f;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.3);
      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --border: #2a2a3a;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.3;
      z-index: 0;
    }

    /* Radial glow */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(108, 99, 255, 0.12);
      border: 1px solid rgba(108, 99, 255, 0.3);
      border-radius: 100px;
      padding: 0.35rem 1rem;
      margin-bottom: 2rem;
    }

    .project-name {
      font-size: clamp(3rem, 10vw, 6.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(135deg, #ffffff 0%, #a0a0c0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
    }

    .project-name span {
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 1.05rem;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
      margin-bottom: 3rem;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      margin: 0 auto 3rem;
      border-radius: 2px;
    }

    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 24px var(--accent-glow);
    }

    .btn-primary:hover {
      background: #7c73ff;
      box-shadow: 0 0 36px rgba(108, 99, 255, 0.5);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: #1e1e2a;
      border-color: #3a3a50;
      transform: translateY(-2px);
    }

    .stats {
      display: flex;
      gap: 2.5rem;
      justify-content: center;
      margin-top: 4rem;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-primary);
      display: block;
    }

    .stat-label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-top: 0.25rem;
      display: block;
    }

    .stat-sep {
      width: 1px;
      height: 40px;
      background: var(--border);
      align-self: center;
    }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      z-index: 1;
    }

    @media (max-width: 480px) {
      .stat-sep { display: none; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="badge">Project</div>

    <h1 class="project-name">web<span>-app2</span></h1>

    <p class="tagline">Modern · Minimal · Built to scale</p>

    <div class="divider"></div>

    <div class="actions">
      <a href="#" class="btn btn-primary">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Get Started
      </a>
      <a href="#" class="btn btn-secondary">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
        </svg>
        Repository
      </a>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-value">v2.0</span>
        <span class="stat-label">Version</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat">
        <span class="stat-value">Active</span>
        <span class="stat-label">Status</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat">
        <span class="stat-value">2025</span>
        <span class="stat-label">Year</span>
      </div>
    </div>
  </div>

  <div class="footer">web-app2 &nbsp;·&nbsp; All rights reserved</div>

</body>
</html>
