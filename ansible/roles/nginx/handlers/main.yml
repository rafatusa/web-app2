---
- name: restart nginx
  become: true
  ansible.builtin.service:
    name: nginx
    state: restarted
  listen: "restart nginx"

- name: reload nginx
  become: true
  ansible.builtin.service:
    name: nginx
    state: reloaded
  listen: "reload nginx"

- name: start nginx
  become: true
  ansible.builtin.service:
    name: nginx
    state: started
  listen: "start nginx"

- name: stop nginx
  become: true
  ansible.builtin.service:
    name: nginx
    state: stopped
  listen: "stop nginx"

- name: validate nginx configuration
  become: true
  ansible.builtin.command:
    cmd: nginx -t
  register: nginx_config_test
  changed_when: false
  failed_when: nginx_config_test.rc != 0
  listen: "validate nginx configuration"