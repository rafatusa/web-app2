[web_servers]
web-app2-server ansible_host=ec2-web-app2.compute.amazonaws.com ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/web-app2-key.pem

[web_servers:vars]
ansible_python_interpreter=/usr/bin/python3
project_name=web-app2
nginx_port=80
nginx_ssl_port=443
app_root=/var/www/web-app2
environment=production

[all:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no'